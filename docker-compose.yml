services:
  empathy-anchor:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data/journals:/app/data/journals
      - ./data/alerts:/app/data
      - ./showcase:/app/showcase:ro
    environment:
      - PORT=8000
      - OFFLINE_MODE=true
      - FLASK_ENV=development
      - DEMO_AUTH=true
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-local-demo-only-not-for-production}
      - ALERT_DB_PATH=/app/data/alerts.db
      - CORS_ORIGINS=http://localhost:8000,http://127.0.0.1:8000
    security_opt:
      - no-new-privileges
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    restart: unless-stopped
