services:
  empathy-anchor:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data/journals:/app/data/journals
      - ./data/alerts:/app/data
    environment:
      - PORT=8000
      - OFFLINE_MODE=true
      - FLASK_ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-demo-jwt-secret-change-for-real-deployments}
      - DEMO_AUTH=true
      - ALERT_DB_PATH=/app/data/alerts.db
    security_opt:
      - no-new-privileges
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    restart: unless-stopped

