name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-tests:
    name: Node.js tests (${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Validate package metadata
        run: npm pkg get name version scripts

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Smoke test module import
        run: |
          node - <<'NODE'
          const OpenClaw = require('./index');
          const app = new OpenClaw();
          const result = app.chat('I feel anxious today');
          if (!result || !result.response || !result.metadata) {
            throw new Error('OpenClaw smoke test failed');
          }
          console.log('Smoke test passed');
          NODE
