name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-tests:
    name: Node.js tests (${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Validate package metadata
        run: npm pkg get name version scripts engines

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Smoke test module import
        run: |
          node - <<'NODE'
          const OpenClaw = require('./index');
          const app = new OpenClaw();
          const result = app.chat('I feel anxious today');
          if (!result || !result.response || !result.metadata) {
            throw new Error('OpenClaw smoke test failed');
          }
          console.log('Smoke test passed');
          NODE

  python-tests:
    name: Python backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: pytest backend/tests/ -v

  docker-smoke:
    name: Docker build and health check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t empathy-anchor:test .

      - name: Start container and verify health
        run: |
          docker run -d --name empathy-test \
            -e JWT_SECRET_KEY=ci-docker-test-secret-key \
            -e DEMO_AUTH=true \
            -p 8000:8000 \
            empathy-anchor:test

          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Health check passed"
              docker stop empathy-test
              exit 0
            fi
            sleep 2
          done

          docker logs empathy-test
          docker stop empathy-test
          exit 1
