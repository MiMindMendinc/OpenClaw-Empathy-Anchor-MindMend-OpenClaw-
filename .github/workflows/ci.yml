name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  node-tests:
    name: Node.js tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20.x'
      - run: npm install --ignore-scripts
      - run: npm audit --audit-level=high || true
      - run: npm test
      - name: Smoke import
        run: |
          node - <<'NODE'
          const OpenClaw = require('./index');
          const app = new OpenClaw();
          const result = app.chat('I feel anxious today');
          if (!result || !result.response || !result.metadata) throw new Error('smoke failed');
          console.log('ok');
          NODE

  python-tests:
    name: Python backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.txt pip-audit
      - run: pip-audit -r backend/requirements.txt || true
      - run: DEMO_AUTH=true pytest backend/tests/ -v
      - name: Detector evaluation smoke
        run: python backend/eval/run_eval.py
      - name: Showcase markup checks
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('showcase/index.html').read_text()
          css = Path('showcase/styles.css').read_text()
          assert 'viewport' in html
          assert 'MindMend Empathy Anchor' in html
          assert 'fonts.googleapis.com' not in html
          assert '@media (min-width: 768px)' in css
          assert 'safe-area-inset' in css
          print('showcase markup ok')
          PY

  docker-smoke:
    name: Docker build and readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker build -t mindmend-empathy-anchor:test .
      - name: Run container and verify /ready
        run: |
          docker run -d --name mindmend-test \
            -e JWT_SECRET_KEY=ci-docker-test-secret-key \
            -e DEMO_AUTH=true \
            -e ALLOW_LAN_BIND=true \
            -e BIND_HOST=0.0.0.0 \
            -p 8000:8000 \
            mindmend-empathy-anchor:test
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/ready; then
              curl -sf http://127.0.0.1:8000/ | head -c 200 | grep -q MindMend
              docker stop mindmend-test
              exit 0
            fi
            sleep 2
          done
          docker logs mindmend-test
          docker stop mindmend-test
          exit 1
